front:
  text: 道德眞經傳表必五臣惠卿言臣聞庖丁奏刀得養生於文惠輪扁釋鑿議讀書於齊桓志之不分道或有在臣誠惶誠懼頓首頓首臣竊以大制散於智慧之僞含生失其性情之初爰有眞人起明至教獨推原於道德蓋祖述於典墳是以雞犬相聞莊周指謂神農而上谷神不死列子稱爲黄帝之書究其微言中有妙物唯恍唯惚視聽莫得以見聞不古不今迎隨孰知其首尾失之其出彌遠至寳祕於荆山而莫知悟之不召自來玄珠索之象罔而可得軒轅華胥之國唐堯姑射之山皆極至遊遂臻泰定此書之指其詣不殊曹參師於蓋公而相齊國孝文傳之河上而爲漢宗僅得淺膚猶幾康阜夫唯俗學不識道眞徒見其文有異詩書之迹莫知其指乃是皇王之宗故聞不尚賢則謂遺之野而不收不貴貨則謂棄諸地而不用謂絶學則無憂等於禽犢謂絶聖則無法同於鴻荒不知靈府之間有若清眸之上雖留金屑亦翳神光故令善惡之兩遺而極沖虚之一致兹難情度宜使智迷遂以允聖之信言列於百家之珍說發兹微學宜屬至神伏惟皇帝陛下以高眞之質而出應君師以妙本之餘而形爲事業蠱飭而庶政交舉革當而四方已孚方將齊心服形而捐治物養已之累深根固蔕以趣長生乆視之門同天下於華胥見神人於姑射深造其極適丁斯時臣性維顓蒙生足憂患每思朝徹以解天弢汎觀以考其散殊又損而期於脗合維日不足歷年於兹晚於斯文忽若有得即動而靜物芸芸而歸根由濁以清中㝠㝠而見曉遂以其意達之於辭雖云自安未知其可竊謂至人之靜鑑實爲學者之元龜敢用冒聞以占中否龍隨章散固難知其上天馬以智專因可取於辯道儻有一言之補敢辭萬死之誅所著老子道德經傳凡四册謹奉表投進以聞臣惠卿誠惶誠懼頓首頓首謹言

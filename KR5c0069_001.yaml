body:
  text: 資政殿學士吕惠卿傳道可道章第一道可道非常道名可名非常名無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門傳曰凡天下之道其可道者莫非道也而有時乎而殆則非常道也凡天下之名其可名者莫非名也而有時乎而去則非常名也萬物藝藝各復歸其根而不知曰靜靜曰復命復命曰常為道而至乎常則心凝形釋物我皆忘夫孰知道之可道而名之可名哉則常道者固不可道也故曰道乃久殁身不殆常名者固不可名也故曰自古及今其名不去不殆不去是之謂常道常無名則無名者道也而天地之所自而始也故曰無名天地之始大初有無無有無名有無無則一亦不可得有無名則一之所起有一而未有形也既謂之一則雖未有形且已有名矣名為一而名之者為二二與一為三萬物紛紛自此生矣故曰有名萬物之母知常曰明明則無所不見也故唯常為可以觀方其無欲也則滌除玄覽而無疵於此觀其妙故曰常無欲可名於小矣方其有欲也則萬物並作而藝藝於此觀其徼故曰萬物皆往歸焉而不知主可名於大矣唯小所以見其妙唯大所以見其徼也此兩者其出則同顧其名異而已其名異也其實未嘗異其實未嘗異則有欲之與無欲求其所出皆不同得不可得則其所出也故同謂之玄玄之為黑色與赤同乎一也天之色玄陰與陽同乎一也名之出玄有欲與無欲同乎一也同乎一固妙矣然妙乎一矣未妙乎多也妙乎我矣未妙乎物也玄之又玄則同者亦不可得同者不可得則一之與多我之與物莫不皆妙也萬物之所以妙出於此而已故曰玄之又玄衆妙之門天下皆知章第二天下皆知美之為美斯惡已皆知善之為善斯不善已故有無之相生難易之相成長短之相形高下之相傾聲音之相和前後之相隨是以聖人處無為之事行不言之教萬物作而不辭生而不有為而不恃功成不居夫唯不居是以不去傳曰天下皆知美之為美善之為善而欲之知惡與不善而惡之然自離道言之則雖美與善皆離乎道矣自出於道言之則雖惡與不善皆非道之外也由是觀之則美斯惡善斯不善豈虛言哉是故天下之物生於有有生於無是之謂有無之相生難事作於易而易亦由難之故無難是之謂難易之相成有鶴脛之長而後知有鳧脛之短有鳧脛之短而後有鶴脛之長是之謂長短之相形以高為是則百谷為川瀆之源則高有以傾乎下以下為是則川瀆為百谷之歸則下有以傾乎高是之謂高下之相傾黃鍾為君則餘律和之餘律為君則黃鍾和之是之謂音聲之相和自秋冬而望春夏則春夏前而秋冬後自春夏而望秋冬則秋冬前而春夏後是之謂前後之相隨凡此六者當其時適其情天下謂之美謂之善不當其時不適其情天下謂之惡謂之不善夫豈知所謂至美至善哉則美與惡善與不善亦迭相為往來興廢而已豈常也哉是故聖人知其如此也以常道處事而事出於無為以常名行教而教出於不言事出於無為則終日為而未嘗為教出於不言則終日言而未嘗言則美與惡善與不善吾何容心哉若然者無往不妙無往不妙則萬物之作吾不見其作與作之者不見其生與生之者不見其為與為之者則雖作不作雖生不生雖為不為吾何辭何有何恃哉此所以功成而不居也夫有居則有去在已無居夫將安去哉不尚賢章第三不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治也虛其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢為也為無為則無不治矣傳曰聖人知夫美斯惡善斯不善而我無容心焉故雖靡天下之爵因任而已而賢非所尚也聚天下之財養仁而已而難得之貨非所貴也民之爭常出於相賢知賢非上之所尚則不爭矣故曰舉賢則民相軋民之盜常出於欲利知貨非上之所貴則不為盜矣故曰茍子之不欲雖賞之不竊君子之所欲者賢也小人之所欲者貨也我皆不見其可欲則心不亂矣然則不尚賢者非遺於野而不用也不貴難得之貨者非委之地而不收也內不以存諸心而外不以遺其迹而已矣是以聖人之治也虛其心實其腹弱其志強其骨心藏神而腹者心之宅虛其心則神不虧而腹實矣腎藏志而骨者腎之餘弱其志則精不搖而骨強矣虛其心而腹實則常使民無知也弱其志而骨強則常使民無欲也智者知賢非上之所尚而貨非上之所貴則為之非所利故不敢為也夫唯如此則為無為而無不治也道沖章第四道沖而用之或不盈淵兮似萬物之宗挫其鋭解其紛和其光同其塵湛兮似或存吾不知誰之子象帝之先傳曰萬物負陰而抱陽沖氣以為和則沖者陰陽和也陰為虛陽為盈道之體則沖而其用之則或不盈其體沖也故有欲無欲同謂之玄其用之不盈也故虛心弱志而常使民無知無欲而已唯其如此故淵兮似萬物之宗而求其為宗者固不可得也似之而已然則何以得此道哉挫其鋭解其紛和其光同其塵而已心出而入物為鋭挫其鋭而勿行物至而交心為紛解其紛而勿擾鋭挫而紛解則知常之明發乎天光光者塵之外在光不皎故和之而不别塵者光之內在塵不昧故同之而不異夫唯如此則所謂宗者湛兮似或存矣淵兮者言乎其深也湛兮者言乎其清也或不盈者非可以為定虛也似或存者非可以為定存也虛盈存亡吾無所容心則吾安能知其所自生哉見其生天神帝而已故曰吾不知誰之子象帝之先蓋有吾有知有誰而道隱矣吾不知誰則亦不知吾矣此真道之所自而出也生天以先象神帝以始帝則其為形器之先可知矣天地不仁章第五天地不仁以萬物為芻狗聖人不仁以百姓為芻狗天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中傳曰夫道冥於象帝之先而不知誰之所自出則體此道者仁惡足以名之哉夫仁人心而已矣天地體此道者也無所事仁以萬物為芻狗聖人體此道者也無所事仁以百姓為芻狗芻狗之為物無所事仁而畜之者也萬物者與天地同體者也百姓者與聖人同體者也天地聖人自視猶芻狗則其視萬物百姓亦若是而已則生之畜之長之育之何所事仁哉夫唯不仁是之謂大仁然則天地之間其猶橐籥固可見矣蓋橐籥之為物唯其虛而不屈所以動而愈出者也則人也而體此道者言出於不言而已言無言則為無為可知也發於聲而為言見於事而為為或云或為其實一也何則言為之體如是而已不知此則言不出於不言言不出於不言則異乎橐籥之虛動矣其多而數窮不亦宜乎孔子曰夫今之歌者其誰乎知此則知言出於不言矣言出於不言人莫不然也然而不能者以其心不麗乎有則麗乎無不麗乎取則麗乎捨不能適與道相當故也不有不無不取不捨而適與道相當者是之謂守中守中而不已則知言之所以言矣則多言數窮不若守中之為務也故曰人心惟危道心惟微惟精惟一允執厥中谷神不死章第六谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤傳曰谷有形者也以得一故虛而能盈神無形者也以得一故寂而能靈人也能守中而得一則有形之身可使虛而如谷無形之心可使寂而如神則有形與無形合而不死矣古之人以體合於心心合於氣氣合於神神合於無其説是也合則不死不死則不生不生者能生生是謂之玄牝玄者有無之合牝者能生者也故曰谷神不死是謂玄牝道之生天地由此而已故曰玄牝之門是謂天地根以為亡耶則綿綿而未嘗絶以為存耶則惡覩其存哉若存而已若亡而非絶若存而非存則吾之用之存之無所容心吻合之而已何勤之有哉天長地久章第七天長地久天地所以能長且久者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私耶故能成其私傳曰長短形也久近時也天以時行者也嫌不足於形故以長言之地以形運者也嫌不足於時故以久言之天地之根出於玄牝玄牝之體立於谷神之不死不死則不生不生者能生生天地之所以能長且久者以其不自生不自生故能長生猶谷神而已矣然則聖人豈以有其身為纍哉緣於不得已而物莫之能止故曰後其身而身先立於無何有而物莫之能害故曰外其身而身存身者吾之私也後其身外其身則公而無私矣無私也乃能成其私上善若水章第八上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信政善治事善能動善時夫惟不爭故無尤傳曰一陰一陽之謂道繼之者善也謂之繼則已離道而非道之體矣上善者道之所謂善者也非天下皆知善之為善者也故若水焉蓋水善利萬物而不爭處衆人之所惡而上善亦然則雖未足以為幾於道矣江海所以能為百谷王者以其下之也故以居則善地霓桓之審為淵止水之審為淵流水之審為淵故以心則善淵注焉而不滿酌焉而不竭故以與則善仁行險而不失其信故以言則善信其派為川谷其委為瀆海故以政則善治天下莫柔弱於水而攻堅強者莫之能先故以事則善能源泉混混不舍晝夜盈科而後進故以動則善時要之出於不爭而以居善地為本故曰夫唯不爭則天下莫能與之爭故無尤持而盈之章第九持而盈之不如其已揣而鋭之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道傳曰持所以防溢而盈之則重溢也如欲勿溢則如勿盈故曰持而盈之不如其已揣所以慮失而鋭之則重失也如欲勿失則如勿鋭故曰揣而鋭之不可長保滿而不溢所以長守富也持而盈之則金玉滿堂莫之能守矣高而不危所以長守貴也揣而鋭之則富貴而驕自遺其咎矣然則何以免此患哉法天之道而已矣蓋功成名遂身退天之道此所以無私而成其私也封人之告堯曰退已其法天之道之謂乎載營魄章第十載營魄抱一能無離乎專氣致柔能如嬰兒乎滌除玄覽能無疵乎愛民治國能無為乎天門開闔能為雌乎明白四達能無知乎生之畜之生而不有為而不恃長而不宰是謂玄德傳曰夫人之有其身久矣而欲退之以體天之道而不為功名之所纍者豈不難哉然亦有道矣人生始化曰魄魄與精為一則寂然而已既生魄陽曰魂魂與神往來而魄旁精出入則魄隙而不營一離而不抱矣載者終而復始之謂也營者環而無隙之謂也雖已為人矣而載營魄抱一湛然無為如其生之始化則能無離矣能無離則專氣而不分致柔而無忤而能如嬰兒矣能如嬰兒則滌除悔吝玄覽觀妙凡動之微我必知之而能無疵矣所以養中者如此則雖愛民治國不以事纍其心而能無為矣內之滌除玄覽而無疵外之愛民治國而無為則天門開闔常在於我而能為雌矣不將不迎應而不藏則明白四達而能無知矣道至於無知則真知也是其所以人貌而天也夫何功名之纍哉生之畜之生而不有為而不恃長而不宰者乃其所以為天也玄德無他天德之謂也三十輻共一轂章第十一三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用故有之以為利無之以為用傳曰三十輻共一轂當其無有車之用車吾所乘也埏埴以為器當其無有器之用器吾所用也鑿户牖以為室當其無有室之用室吾所居也乘則觀乎車用則觀乎器居則觀乎室其用未嘗不在於無其則不遠矣至於身則不知吾之所以用者何耶故有之以為利無之以為用有有之為利而無無之為用則所謂利者亦廢而不用矣有無之為用而無有之為利則所謂用者亦害而不利矣是故聖人入而未嘗有物也所以為無之之用出而未嘗無物也所以為有之之利故曰精義入神以致用也利用安身以崇德也五色章第十二五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨是以聖人為腹不為目故去彼取此傳曰目之所以為目者色色而非色也屬乎五色則失其所以為目而無異乎盲矣耳之所以為耳者聲聲而非聲也屬乎五音則失其所以為耳而無異乎聾矣口之所以為口者味味而非味也屬乎五味則失其所以為口而無異乎爽矣萬物無足以撓之者心之所以靜而聖也逐乎外則罔念而發狂矣事莫不然而馳騁田獵為尤甚知足不辱知止不殆行所以全也求乎外則辱殆而行妨矣物莫不然而難得之貨為尤甚腹無知者也目有見者也是以聖人為腹不為目故去彼有見有欲之追求而取此無知無欲之虛靜也寵辱章第十三寵辱若驚貴大患若身何為寵辱寵為下得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者為吾有身及吾無身吾有何患故貴以身為天下若可寄天下愛以身為天下若可託天下傳曰寵者畜於人者也下道也寵而有其寵則辱矣吾之所以有辱者以吾有驚未得之則驚得之既得則驚失之若吾無驚吾有何辱則寵之有辱者亦若是而已貴者畜人者也上道也貴而有其貴則有患矣吾之所以有大患者為吾有身故吉亦我所患凶亦我所患若吾無身吾有何患則貴之有大患者亦若是而已言身則知驚之為心言驚則知身之為纍也無心則無驚無驚則無辱無身則無纍無纍則無患矣昔者舜以匹夫而友天子則可謂寵矣而若固有之則何辱之有哉巍巍乎有天下可謂貴矣而不與有焉則何大患之有哉故貴以身為天下若可寄天下寵而招辱則賤其身矣非可以寄天下者也愛以身為天下若可託天下貴而罹患則危其身矣非可以託天下者也若夫寵而不有其寵貴而不有其貴如舜者乃真可以寄託天下者也視之不見章第十四視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰故混而為一其上不皎其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀傳曰視者無有也故視之不見雖不見也然能玄能黃不可名之以無色也曰夷而已聽者無有也故聽之不聞雖不聞也然能宫能商不可名之以無聲也曰希而已摶者無有也故摶之不得雖不得也然能陰能陽能柔能剛能短能長能圓能方能生能死能暑能涼能浮能沉能出能沒能甘能苦能羶能香不可名之以無形也曰微而已凡物求之而不得者或可以致詰而得之此三者終不可致詰者也不可以致詰則隳聰明離形去智而吾得之矣則視也聽也搏也混而為一矣視以目聽以耳摶以心混而為一則耳如目目如耳心如耳目矣夫失道者上見光而下為土吾得之也其上非光也故不皎其下非土也故不昧繩繩兮調直而有信雖有信也而不可名故復歸於無物而已雖無物也是謂無狀之狀無物之象而未嘗無物也是謂惚恍則不皎不皎則疑於無物也而非無物也恍則不昧不昧則疑於有物也而非有物也其始無前故迎之而不見其首其卒無尾故隨之而不見其後無前無後則不古不今矣雖不古不今而未嘗無古今也則長於上古而不為老者吾得之以日用矣故曰執古之道以御今之有所謂古者非異於今也以知古之所自始也所謂今者非異於古也以知今之所從來也誠知古之所自始則知今之所從來矣始無所自來無所從所謂無端之紀也無端之紀者道紀也道不可執也得此則可以執之以為德矣執德之謂紀古之善為士章第十五古之善為士者微妙玄通深不可識夫唯不可識故強為之容豫若冬涉川猶若畏四鄰儼若客涣若冰將釋敦兮其若朴曠兮其若谷渾兮其若濁孰能濁以靜之徐清孰能安以動之徐生保此道者不欲盈夫惟不盈故能敝不新成傳曰古之善為士者將以成聖而盡神也則其為士也雖未至乎聖神所以成聖而盡神者其聞之固已全盡矣微妙玄通深不可識乃所以成聖而盡神也微而後妙妙而後玄玄而後通則深不可識矣夫惟不可識則其形容安得以擬議哉強為之容而已豫若冬涉川迫而後動不得已而後起也猶若畏四鄰間邪存其誠非物捋之則其心不出也儼若客不為主也涣若冰將釋方且終之以心凝形釋骨肉俱融也敦兮其若朴復其初也曠兮其若谷應而不藏也渾兮其若濁無是非彼我之辨也人皆昭昭也孰能濁以靜之徐清者乎徐清則無所不照矣人皆取先也孰能安以動之徐生者乎徐生則無所不出矣蓋欲靜則平氣欲神則順心有為也而欲當則緣於不得已平氣也順心也乃所以徐清也緣於不得已乃所以徐生也此士之所以能成聖而盡神也道之體沖沖也者陰陽之和而盈虛之守而保此道者不欲盈則虛而已然不曰虛而每曰不盈者恐人之纍於虛也纍於虛則不虛矣故曰或不盈不欲盈而已天下之物有新則有敝有敝則有壞則能不敝者鮮矣夫唯不盈則新敝成壞無所容心是以雖敝不敝則不壞不敝不壞則不新不成矣致虛極章第十六致虛極守靜篤萬物並作吾以觀其復夫物藝藝各復歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃久沒身不殆傳曰保此道者不欲盈致虛而不極守靜而不篤則非不盈之至也衆人之於萬物也息而後見其復衰而後見其歸根而我以虛靜之至故見萬物之所以作與其所以藝藝在我而不在彼其所以作者乃其所以復也方其所以藝藝者乃其所以歸根也故以其並作而觀其復則方其藝藝而各復歸其根也然則所謂虛者非虛之而虛也直莫之盈故虛也所謂靜者非靜之而靜也夫物藝藝各歸其根而不知而莫足以撓心故靜也故歸根曰靜命者吾之所受以生者也夫惟靜則復其所以生而能命物矣故靜曰復命道至於能命物則常而不去矣故復命曰常自常觀之則吉凶悔吝常見乎動之微明孰加焉故知常曰明不知常者反此則所作不免妄而已能知常而體之則萬物與我為一矣故知常容萬物與我為一則不內其身而私矣故容乃公萬物與我為一而無私焉大也大則聖內聖外王故公乃王聖然後至於神故王乃天天則神矣道者所以成聖而盡神也故天乃道為道而至於常則盡矣故道乃久殁身不殆久而至於殁身不殆者常之謂已太上章第十七太上下知有之其次親之譽之其次畏之侮之信不足有不信猶其貴言功成事遂百姓謂我自然傳曰執大象天下往由天下方且釋我而忘之其迹孰得而見哉故下知有之而已下知有之者無以尚之故謂之太上則親之譽之者其次畏之侮之又其次可知已何以論之今夫父子愛欽不言而喻至賔主之際朋友之交欲致其欽之之意必有以文之而後喻何則信之足與不足而已則親之譽之已出於信之不足而有不信况於畏之侮之乎然則欲使信至不足而有不信者宜如何哉猶其貴言以復乎道而已貴言者行不言之教而已行不言之教則處無為之事可知也至夫功成事遂百姓謂我自然而莫知為之者則孰得而親譽之哉大道廢章第十八大道廢有仁義智慧出有大偽六親不和有孝慈國家昏亂有忠臣傳曰道不可名名之為道已非道也則又分而為仁義豈道之全哉則有仁義者固大道之廢也賊莫大乎德有心而心有眼及有眼而內視內視則敗矣則智慧出固所以有大偽也偽者德之返也有仁義則其弊至於六親不和而有孝慈矣有大偽則其弊至於國家昏亂而有忠臣矣是故有瞽瞍之頑嚚弟象之傲而後有舜有桀紂之暴而後有龍逄比干此無他去本愈遠而已矣道德真經傳卷之一

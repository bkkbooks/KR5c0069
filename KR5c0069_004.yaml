body:
  text: 資政殿學士吕惠卿傳洽大國章第六十治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神其神不傷民非其神不傷民聖人亦不傷民夫兩不相傷故德交歸焉傳曰得有國之母以治國雖大無難也烹魚者不可以煩而烹小鮮者尤當全之而不割者也治大國者亦若是而已烹而割之則傷矣以道蒞天下者謂之大制亦不割以傷之而已及其至也則其鬼不神凡以不傷之所致也何以言之鬼之為道非不神也厥與人雜擾而見其神則不能不傷人而所以不神者以聖人為能以道蒞天下使人不淫其性不遷其德無大喜大怒以干陰陽之和所謂處混芒之中與一世而得淡漠焉者也則是聖人亦不傷人也唯聖人為能不傷人故陰陽和靜鬼神不擾萬物不傷群生不夭則其神不傷人也神不傷人則無以見其靈響而神焉由此觀之其鬼不神非其鬼不神也由其神不傷人故不神也非神不傷人由聖人亦不傷人故其神不傷人也使聖人之於人不能全其朴而傷之而人失其性至於四時不至寒暑之和不成人之所以傷神者為多則神其能不傷人乎夫唯神不傷人則神歸德於人神不傷人而人亦歸德於神矣故曰夫兩不相傷故德交歸焉大國者下流章第六十一大國者下流天下之交天下之交牝牝常以靜勝牡以靜為下故大國以下小國則取小國小國以下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜為下傳曰知以道治其國固不傷其人矣而不知所以交天下者則已雖不傷人而有傷其人者矣大國者下流天下之交天下之交牝牝常以靜勝牡以靜為下是乃所以交天下而保其人之道也蓋天下之交牝而牝常以靜勝牡而所以勝者由以靜為下故也大國誠能居下流以致天下之交則牝以靜為下而勝牡之道也故大國以下小國則取小國則所謂或下以取之也下以取之者言大之於小宜若可以無下而下之者以取之故也小國以下大國則取大國則所謂或下而取之者也下而取之者言小之於大不得不下而取之故也蓋大國不過欲兼畜人而小國不過欲入事人今大者下小小復下大兩者各得其所欲則其有不取之者乎取之者言得其心而不失之謂也然則大者小者莫不宜為下而獨曰大者宜為下何也小而不能下大非徒不能取大國而亦禍災及之矣則不嫌於不宜故曰大者宜為下而已道者萬物之奧章第六十二道者萬物之奧善人之寶不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何不曰求以得有罪以免邪故為天下貴傳曰萬物負陰而抱陽沖氣以為和則未有一物而不足於道者也室之有奧深邃燕間而尊者之所處也萬物莫不有深邃燕間尊高之處則道是也故曰道者萬物之奧唯其如此故善人之寶而不善人之所保也何則善人知其善之所自出則得之而有無窮不資之富非其寶耶不善人知其不善至於此而玄同則雖有萬惡涣然而釋矣非其所保耶夫言之美者可以市行之尊者可以加人則人無善不善固知美所美而尊所尊也有道者之於人猶天地也天無不覆地無不載非特美言尊行之比也則人之不善何棄之有故立天子置三公雖有拱璧以先駟馬所以享於上者禮之恭幣之重者也然不如坐進此道以道之為天下貴雖坐而進之過於恭禮重幣也天子三公所以坐而論者不過此而已矣古之所以貴此道者何也不日求以得有罪以免耶為天下貴求以得則所謂善人之寶有罪以免則所謂不善人之所保也唯其如此此所以為天下貴而古之所以不得不貴也為無為章第六十三為無為事無事味無味大小多少報怨以德圖難於其易為大於其細天下難事必作於易天下大事必作於細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人由難之故終無難傳曰有道者其為常出於不為故為無為為無為故事無事事無事故味無味何則方吾之為也求其為者不可得則為出於不為矣有為則有事為而無為則事亦無事也非徒無事也雖味之而無味矣味之者反覆尋繹之之謂也道之為物視之不見聽之不聞摶之不得雖反覆尋繹之復歸於無物而已矣唯其如此故可以大可以小可以多可以少多少舉在於我而所謂怨者固無常心則不善者吾亦善之德善不信者吾亦信之德信而皆報之以德矣人之所難忘者怨也而以德報之則它不足纍其心矣非徒然也而圖難於其易為大於其細以天下之難事必作於易天下之大事必作於細而我常無作也苟有所作必於易與細而見之則所謂知幾其神者是也能得之於吾心則其推之於天下國家無難矣是以聖人終不為大故能成其大以為大於其細而不為大於其大故也出諾易也復言難也不愼重於出諾之際則言難復矣易而圖之則易也難而圖之則難矣不圖之於易圖之始而圖之於難則難矣此俗人之所以寡信而多難也是以聖人由難之故終無難以難之於其易而不難之於難也其安易持章第六十四其安易持其未兆易謀其脆易破其微易散為之於未有治之於未亂合抱之木生於毫末九層之臺起於纍土千里之行始於足下為者敗之執者失之是以聖人無為故無敗無執故無失民之從事常於幾成而敗之愼終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢為傳曰其安易持危而持之則難矣其未兆易謀已動而謀之則難矣其脆易破則不可使至於堅其微易散則不可使至於著物皆然心為甚通諸其心則於天下國家無難矣安也未兆也則是為之於未有也脆也微也則是治之於未亂也合抱之木生於毫末生於小也九層之臺起於纍土高起於下也千里之行始於足下遠起於近也則為之於未有治之於未亂其本末常如此也為之於未有則是以不為為之也治之於未亂則是以不治治之也已有而為之則為之欲成而反敗之已亂而治之則執之欲固而反失之也是以聖人為之於未有則我固無為也故無敗治之於未亂則我固無執也故無失民之從事常在既有之後故至於幾成而敗之以不知其本故也使知大生於小高起於下遠始於近愼終如始則無敗事也是以聖人欲不欲不貴難得之貨則滑欲於俗而思以求致其明非知此者也學不學以復衆人之所過以輔萬物之自然而不敢為則繕性於俗俗學以求復其初者非知此者也古之善為道章第六十五古之善為道者非以明民將以愚之民之難治以其智多故以智治國國之賊不以智洽國國之福知此兩者亦楷式常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順傳曰衆人昭昭我獨若昏俗人察察我獨悶悶我愚人之心也哉古之善為道者在已若此則推之於民也固非明之將以愚之也察察昭昭則所謂明之也若昏悶悶則所謂愚之也民之失性居華而去實故智多而難治誠欲治之則去智與故鎮之以無名之朴則彼將自化而以智治之適所以亂之也蓋不識不知順帝之則而毁則為賊治國而以智則毁其則矣故曰以智治國國之賊治國而不以智則無介然之知其道甚夷而無益生之祥則有國之母可以長久故不以智治國國之福知此兩者非特施之於治國而已而於身亦楷式而未嘗違也蓋知其子守其母殁身不殆則不以智治之而福者也開其兊濟其事終身不救則以智治之而賊者也則不以智之與以智非亦我之楷式乎誠知楷式而不違其德可謂玄矣德而至於玄則深而不可測遠而不可量以情觀之不能莫逆於心及其至也與物反本無所於逆矣故曰常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順江海為百谷王章第六十六江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭傳曰江海之所以能為百谷王者以其善下之故能為百谷王則能為天下王者亦善下之而已則玄德者乃所以下下之道也莊周以為以此處下則玄聖素王之道而舜之在下則曰玄德升聞則玄德者固聖人所以處下之道也以處下之道而居人上乃所以下之也聖人之有天下也以言其位則固欲上人也然以孤寡不穀為稱而受國之垢與不祥則以其言下之也以言其序則固欲先人也然迫而後動感而後應不得已而後起則以其身後之也夫惟以其言下之則處上而人不重不重則以戴之為輕矣以其身後之則處前而人不害不害則以從之為利矣不重不害此天下所以樂推而不厭也夫以其言下之以其身後之則不爭者也樂推而不厭則天下莫能與之爭者也非體玄德者其能若是乎故曰夫惟不爭故天下莫能與之爭天下皆謂章第六十七天下皆謂我道大似不肖夫惟大故似不肖若肖久矣其細也夫我有三寶保而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能成器長今捨其慈且勇捨其儉且廣捨其後且先死矣夫慈以戰則勝以守則固天將救之以慈衛之傳曰天下徒見我道之大而謂其似不肖而不知其所以大固似不肖也何以言之大道泛兮其可左右無乎不在者也彼見其無乎不在無可擬者謂之似不肖而不知其無不在而似不肖乃道之所以為大也蓋萬物莫非道也則道外無物矣道外無物則無所肖者此其所以為大也若有所肖則道外有物矣道外有物則道有所不在其尚得為大乎故曰天下皆謂我道大似不肖夫惟大故似不肖若肖久矣其細也夫蓋我道所以如此之大者以吾無我而不爭故也夫唯無我而不爭故能持人之所難持我有三寶保而持之一曰慈二曰儉三曰不敢為天下先此皆持人之所難持者也何則人不能無我而不爭故勇而不能慈廣而不能儉先而不能後則無我不爭乃其所以能保此三寶而持之也天下有始以為天下母而我守之常寬容於物不削於人非慈乎其行身也徐而不費以約為紀非儉乎未嘗先人而常隨人人皆取先已獨取後非不敢為天下先乎夫慈為柔弱矣而能勝剛强是能勇也儉為不費矣而用之不可既是能廣也不敢為天下先為後人矣而聖人用之以為官長者皆從我者也是能成器長也今捨其慈且勇捨其儉且廣捨其後且先則剛强之徒而已死不亦宜乎夫自事觀之則軍旅之事愛克厥威允罔功則慈宜若有所不行也然自本觀之則所以能立其威者以慈而已矣故曰夫慈以戰則勝以守則固夫惟慈故儉儉故不敢為天下先則慈者三寶之所自而始也捨其慈則死保其慈則生則慈乃所以衛吾生者也故曰天將救之以慈衛之慈立而三寶舉矣善為士章第六十八善為士者不武善戰者不怒善勝敵者不爭善用人者為之下是謂不爭之德是謂用人之力是謂配天古之極傳曰士之為言事道而以將人為任者也事道則以不爭而勝將人則用人之力若然者何所事武哉故曰善為士者不武為士而無所事武則善戰者不怒善勝敵者不爭善用人者為之下固其宜也何則體道者不爭不爭則天下莫能與之爭則善為士者不武善戰者不怒善勝敵者不爭是謂不爭之德也體道者能下人能下人者樂為之用而不自用則善用人者為之下是謂用人之力也德則不爭力則用人雖用兵之危我猶無為況其它乎無為為之之謂天德至於無為則與天同而無以加矣故曰是謂配天古之極用兵有言章第六十九用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵則幾喪吾寶故抗兵相加哀者勝矣傳曰道之動常在於迫而能以不爭勝其施之於用兵之際宜若有所不行者也而用兵者有言吾不敢為主而為客不敢進寸而退尺則雖兵猶迫而後動而勝之以不爭也而况其它乎何則主逆而客順主勞而客逸進驕而退卑進躁而退靜以順待逆以逸待勞以卑待驕以靜待躁皆非所敵也所以爾者道之為常出於無為故其動常出於迫而其勝常以不爭雖兵亦猶是故也誠知為常出於無為則吾之行常無行其攘常無臂其仍常無敵其執常無兵安往而不勝哉苟為不能出於無為知主而不知客知進而不知退是之謂輕敵輕敵則吾之所謂三寶保而持之者幾於喪矣故曰禍莫大於輕敵輕敵則幾喪吾寶夫唯以不爭為勝者則未有能勝之者也故曰抗兵相加哀者勝矣吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫唯無知是以不我知知我者希則我貴矣是以聖人被褐懷玉傳曰道法自然其言亦希而自然自然則無為則知之行之也不乃甚易乎而天下不能知不能行何耶以言有宗事有君而天下不知其宗與君是以不吾知也何謂宗無為而自然者言之宗也自其宗推之則言雖不同皆苗裔而已矣其有不知者乎何謂君無為而自然者事之君也得其君而治之則事雖不同皆臣妾而已矣其有不行者乎惟其不知宗之與君此所以不吾知也夫道之所以為天下貴以其不可以知知不可以識識故為天下貴使道而可以知知識識則何貴於道哉故曰知我者希則我貴矣是以聖人以若辱若愚之容而大白盛德天下鮮儷者是之謂被褐懷玉知不知上章第七十一知不知上不知知病夫唯病病是以不病聖人不病以其病病是以不病傳曰道之為體不知而能知者也知其不知而以不知知之知之至者也故曰知不知上雖知其不知而以知知之則其心庸詎而寧乎故曰不知知病夫唯知知之為病而病之則反乎無知而知不足以病之矣故曰夫唯病病是以不病聖人不病以此而已故曰以其病病是以不病南伯子綦曰我悲人之自喪者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日遠矣若子綦者可謂病病者乎民不畏威章第七十二民不畏威則大威至無狹其所居無厭其所生夫唯不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此傳曰民不冥於道而唯識知之尚故生生厚生生厚故輕死輕死故不畏威民至於不畏威則無所不為此天之所自以明威而大降其威虐也故曰民不畏威則大威至矣夫唯以道治天下者知夫充滿天地包裹六極凡命於天者其居之所同然也勿狹之而已矣精神四達並流無所不極凡命於天者其生之所同然也勿厭之而已矣夫民無常在我而已夫唯我不厭是以民亦不厭也則奚不畏威之有哉是故聖人自知以常而不自見以外其身知常而外其身乃所以不狹其所居也自愛以嗇而不自貴以遺其生愛嗇而遺其生乃所以不厭其所生也故去彼知識之病而取此不識不知之不病也勇於敢章第七十三勇於敢則殺勇於不敢則活知此兩者或利或害天之所惡執知其故是以聖人猶難之天之道不爭而善勝不言而善應不召而自來坦然而善謀天網恢恢疏而不失傳曰用其剛强而必於外物者勇於敢者也則死之徒是已故曰勇於敢則殺致其柔弱而無所必者勇於不敢者也則生之徒是已故曰勇於不敢則活勇於敢者人以為利而害或在其中矣勇於不敢者人以為害而利或在其中矣然則天之所惡殆非可以知知而識識也故曰此兩者或利或害天之所惡孰知其故是以聖人之動也豫若冬涉川猶若畏四鄰猶難之若此者以天之所惡為不可知故也夫唯不可知則不識不知乃所以順帝之則也蓋天之生物因其材而篤焉栽者培之傾者覆之則未嘗與物爭者也而物莫能違之者故曰不爭而善勝天何言哉四時行焉百物生焉其行其生未嘗差也故曰不言而善應莫之為而為者天也莫之致而至者命也故曰不召而自來易則易知而其道盈虛與時消息而未嘗違故曰坦然而善謀天聰明自我民聰明天明威自我民明威其聰明明威未嘗自用而惠吉逆凶猶影響也故曰天網恢恢疏而不失夫唯天之道不可知為如此聖人所以勇於不敢而不識不知乃知所以順之也民常不畏死章第七十四民常不畏死奈何以死懼之若使人常畏死而為奇者吾得執而殺之孰敢常有司殺者殺而代司殺者殺是代大匠斫夫代大匠斫希有不傷其手矣傳曰民之為道固常不畏死者也唯無狹其所居無厭其所生則可以使之畏威而重死矣奈何以死而懼之而欲其畏死乎何以知其然也若使民常畏死而為奇者吾得執而殺之則孰敢不畏死而為奇乎然而執之而不勝殺之而不止者則民之不畏死而不可以死懼之明矣然則以道治天下者宜如何哉常有司殺者殺勿代之而已矣何謂常有司殺者殺天網恢恢疏而不失天討有罪五刑五用則司殺者天之謂也刑戮有出於好惡而不用於天討則是代司殺者殺也代司殺者殺是代大匠斫代大匠斫希有不傷其手者矣則代司殺者殺其傷可知也民之飢章第七十五民之飢以其上食稅之多是以飢民之難治以其上之有為是以難治人之輕死以其生生之厚是以輕死惟無以生為者是賢於貴生傳曰一夫之耕足以食數口則奚至於飢哉而至於飢者非以其上食稅之多故飢耶織而衣耕而食是謂同德奚難治哉而至於難治者非以其上之有為故難治耶甘其食美其服安其俗樂其居則奚至於輕死哉而至於輕死者非以其生生之厚故輕死耶是以聖人無事而民自富無欲而民自朴則至於食稅之多而飢無有也無為而民自化好靜而民自正則至於有為而難治無有也自富自朴自化自正而不飢以難治則至於生生之厚而輕死無有也蓋所以生生之厚而至於輕死者以其踶跂好知爭歸於利而不可止故也夫唯生生之厚遂至於輕死則無以生為者賢於貴生可知矣是故聖人不自見以外其身不自貴以遺其生知其無以生為而已矣人之生章第七十六人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝木强則共堅强居下柔弱處上傳曰道之為物無形而不爭則天下之至柔弱而人莫之喻也故以有形喻之人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁則雖有形者亦以堅强而死柔弱而生而況體無形之道而不致其柔弱其可得乎是以兵强則恃之而驕而敵國之所謀也我驕而敵謀則所以不勝也木强則伐伐之所以共而舉之也非徒然也而以位言之則天以氣在上地以形在下氣則柔弱形則堅强臣以有為事上君以無為畜下有為則堅强無為則柔弱堅强居下柔弱處上物之理也然則柔弱之能勝剛强可知矣天之道章第七十七天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者與之天之道損有餘補不足人之道則不然損不足以奉有餘孰能以有餘奉天下唯有道者是以聖人為而不恃功成不處其不欲見賢耶傳曰天之道無為而已矣無為則無私無私則均猶之張弓也高者抑之下者舉之有餘者損之不足者補之適於均而已矣夫天之道非故以抑高而舉下也無為任物之自然則高者為有餘不得不抑而損下者為不足不得不舉而益滿招損謙受增時乃天道是也人之道不能無為不能無為則不能無私不能無私則至於損不足以奉有餘不足異也夫唯有道者知未始有物而有為之與功名皆我所餘而天下之所不足而爭之故損之以奉天下而不有此故曰孰能損有餘以奉天下唯有道者聖人則有道者也是以為而不恃功成不居其不欲見者無它凡以法天之道而已矣天下柔弱章第七十八天下柔弱莫過於水而攻堅强者莫之能先其無以易之故柔勝剛弱勝强天下莫不知莫能行是以聖人言受國之垢是謂社稷主受國不祥是謂天下王正言若反傳曰天下之物唯水為能因物之曲直方圓而從之則是柔弱莫過於水者也而流大物轉大石穿突陵谷浮載天地唯水為能則是攻堅强者無以先之也所以然者以其雖曲折萬變而終不失其所以為水是其無以易之也夫水之為柔弱而柔弱之勝剛强天下莫不知而老子數數稱之何也以天下雖莫不知而莫能行也夫聰明睿知足以有臨矣則其患者豈在於材力之不足也顧未能損有餘以奉天下持之以柔弱而常為名尸智主事任謀府之所纍耶故老子論道德之將終而數數及此言又引聖人言以信之曰受國之垢是謂社稷主受國之不祥是謂天下王明所以服天下者在此而不在彼也夫三代之王必先其令聞而曰受國之垢與不祥而為社稷主為天下王何也蓋必先其令聞者非過名之言也不及名之言也受國之垢與不祥則過名之言也名不足以言之也不及名之言應事應事言之變也過名之言體道體道言之正也正言而曰受國之垢與不祥故曰正言若反湯武之言曰萬方有罪在子一人此知以國之垢與不祥而受之者也和大怨章第七十九和大怨必有餘怨安可以為善是以聖人執左契而不責人故有德司契無德司徹天道無親常與善人傳曰復讎者不折鏌干雖有忮心不怨飄瓦是以天下平均不由此道則怨之所生也而人欲和之不可勝解矣故曰和大怨者必有餘怨不善者吾亦善之乃所以為德善和大怨而不免於有餘怨安可以為善哉是以聖人執左契而不責於人是乃使復讎者不折鏌干雖有忮心不怨飄瓦而天下平均之道也蓋古之獻車馬執右契右契所以取左契所以與則左契者常以與人而不為物主者也聖人為而不恃功成不居每以有餘奉天下至於殺人則有司殺者殺而未嘗尸之則是執左契以與人而不為物主此其所以無怨而不責於人之道也夫豈以和之為悅乎故有德司契則不責於人而已無德司徹以通物為事者也天道無親常與善人無親而唯善人之與是亦執左契而不責於人之道也小國寡民章第八十小國寡民使有什伯之器而不用使民重死而不遠徙雖有舟輿無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望雞犬之音相聞民至老死不相往來傳曰三代以來至於周衰其文弊甚矣民失其性命之情故老子之言救之質以反太古之治小國寡民使有什伯之器而不用使民重死而不遠徙雖有舟輿無所乘之雖有甲兵無所陳之此救之以質而反乎太古之道也莊周稱至德之世曰昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏犧氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞犬之音相聞民至老死而不相往來則若此者非特老子之言而已古固有是道也然詩書之所言則止於堯舜三代而老子欲反太古之治何哉曰夫道與世之交相喪久矣非大道不足使人反性命之情言道而不及其世不足以知大道之已試此其所以必反太古之治也然則世去太古也久矣遂可以盡復乎曰未可也然則其言之何也曰禮至於兼三王樂至於備六代其文極矣然而禮不以玄水大羹而措之醴酒和羹之下樂不以嘒管清聲而加之朱絃疏越之上者使人知禮樂之意所不得已者如彼而所欲反本復始如此也方斯時也孔子方求文武周公之墜緒而賡之老子論其道與世如此其意猶是而已矣譬之月建已而火始王而金氣已生於其間矣此五材所以相繼而不絶也故聞古之治雖有什伯之器而不用有舟輿而不乘有甲兵而不陳則舉大事用大衆非得已也聞其民結繩而用之鄰國相望雞犬相聞至老死而不相往來則煩文倦令督稽趣留而足迹接乎諸侯之境車軌結乎千里之外非得已也則不得已者常在於此而所欲復者常在於彼也則其肯煩事為以深治人之過乎然則欲天下不安平泰不可得也即殁而不言猶屏玄水徹疏越其孰知禮之寧儉而樂之節樂為反本復始之意乎夫聖人之言豈小補哉信言不美章第八十一信言不美美言不信善者不辨辨者不善知者不博博者不知聖人無積既以為人已愈有既以與人已愈多天之道利而不害聖人之道為而不爭傳曰道之為物視之不見聽之不聞搏之不得可以默契不可以情求者也則信言者信此而已安事善美言者善此而已安事辨知言者知此而已安事博由是觀之則美者不信辨者不善博者不知可知已何則雖美與辨與博而不當於道故也道之為物未始有物者也聖人者與道合體夫何積之有哉唯其無積故萬物與我為一萬物與我為一則至富者也故既以為人已愈有既以與人已愈多使其有積也則用之有時而既矣安能愈有而愈多乎老子之言也內觀諸心外觀諸物仰觀諸天俯觀諸地無有不契是信也然而下士聞而笑之天下以為似不肖是不美也言之至近而指至遠是善也然而非以言為悅是不辨也其知至於無知是知也而其約不離乎吾心是不博也而學者以美與辨與博求之則疏矣老子之道也以有積為不足雖聖智猶絶而棄之是無積也故至無而供萬物之求則是愈有而愈多也而學者於是不能刳心焉則不可得而至也凡物有所利則有所不利有所不利則不能不害矣唯天之道無所利則無所不利無所不利則利而不害矣凡物之有為者莫不有我有我故有爭唯聖人之道雖為而無為無為故無我無我故不爭是天之道而已矣道德真經傳卷之四

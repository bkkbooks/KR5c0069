body:
  text: 資政殿學士吕惠卿傳絶聖棄智章第十九絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有此三者以為文不足故令有所屬見素抱朴少私寡欲傳曰聖人知天下之亂始於迷本而失性唯無名之朴為可以鎮之絶聖棄智絶仁棄義絶巧棄利乃所以復吾無名之朴而鎮之也絶聖棄智絶仁棄義則不以美與善纍其心矣絶巧棄利則不以惡與不善纍其心矣內不以纍其心而外不以遺其迹則民利百倍民復孝慈盜賊無有固其理也蓋絶聖棄智絶仁棄義不尚賢之盡也絶而棄之則非特不尚而已絶巧棄利不貴難得之貨之盡也絶而棄之則非特不貴而已人之生也萬物皆備於我矣則有至足之富能絶聖棄智而復其初則其利百倍矣民復孝慈則六親皆和而不知有孝慈矣盜賊無有則國家明治而不知有忠臣矣不尚賢使民不爭民利百倍民復孝慈則非特不爭而已不貴難得之貨使民不為盜盜賊無有則非特不為盜而已聖智也仁義也巧利也此三者以為文而非質不足而非全故絶而棄之令有所屬見素抱朴少私寡欲乃其所屬也見素則知其無所與雜而非文抱朴則知其不散而非不足素而不雜朴而不散則復乎性而外物不能惑而少私寡欲矣少私寡欲而後可以語絶學之至道也絶學無憂章第二十絶學無憂唯之與阿相去幾何善之與惡相去何若人之所畏不可不畏荒兮其未央哉衆人熙熙如享太牢如登春臺我獨怕兮其未兆如嬰兒之未孩乘乘兮若無所歸衆人皆有餘而我獨若遺我愚人之心也哉純純兮俗人昭昭我獨若昏俗人察察我獨悶悶忽若晦寂兮似無所止衆人皆有以我獨頑似鄙我獨異於人而貴食母傳曰上絶棄乎聖智仁義之善下絶棄乎巧利之惡不以纍其心則絶學矣絶學則無為無為則神神也者鼓萬物而不與聖人同憂者也故曰絶學無憂唯之與阿出於聲一也其相去幾何善之與惡離乎道一也其相去何若此所以雖聖智猶絶而棄之不以纍其心也憂悔吝者存乎介震無咎者存乎悔則人之所畏不可不畏也荒兮其未央哉未央者以言其大而無極而不獨畏人之所畏也君子小心則畏義而法大則天而道人之所畏不可不畏所以同乎人也荒兮其未央哉所以同乎天也衆人熙熙則不知塞其兊閉其門也如享太牢則不知夫淡乎其無味也如春登臺則不知夫視之不足見也我獨怕兮其未兆若嬰兒之未孩則塞其兊閉其門而無味之足嗜無見之足悅也乘乘兮若無所歸以言唯萬物之乘而在已無居也衆人如享太牢如春登臺故皆有餘我獨怕兮其未兆如嬰兒之未孩故獨若遺凡此者以言其遺物而離形也我愚人之心也哉以言其無知也純純兮以言其不雜也俗人昭昭我獨若昏則異乎俗人之昭昭俗人察察我獨悶悶則異乎俗人之察察矣忽若晦晦則都無所見也都無所見則非特若昏悶悶而已其動也乘乘兮若無所歸其靜也寂兮似無所止俗人昭昭俗人察察故皆有以我獨若昏我獨若悶故頑似鄙凡此者言其去智而忘心也夫視聽思慮道之所自而生者也故於道為子而道則為之母而衆人逐物役智以資其視聽思慮則養其子而已而我則遺而去之凡貴養母故也故曰我獨異於人而貴食母夫老君神矣何所事養而與衆人俗人為異而已欲使為道者知如此而後可以至於道故也然則絶學之大指可知矣而先儒以謂人而不學雖無憂如禽何其未知所以絶學無憂之意矣孔德之容章第二十一孔德之容唯道是從道之為物唯恍唯惚惚兮恍其中有象恍兮惚其中有物窈兮冥兮其中有精其精甚真其中有信自古及今其名不去以閲衆甫吾何以知衆甫之然哉以此傳曰其遺物離形至於若遺其去智忘心至於若鄙則其容之甚德者也夫將何從哉唯道之從而已道之為物唯恍唯惚方惚而恍恍則不昧不昧則明明則疑於有物也然其中有象象者疑於有物而非物也故曰無物之象又曰大象無形方恍而惚惚則不皎不皎則晦晦則疑於無物也然其中有物物者疑於無物而有物者也故曰無狀之狀又曰有物混成恍惚則不測不測則神矣窈冥者神之又神者也神之又神而能精焉故曰窈兮冥兮其中有精精者得道之一而不雜者也天下之物真而不偽信而不忒常而不變未有加於此而天下之始吾於是乎閲之故曰其精甚真其中有信自古及今其名不去以閲衆甫故為道者不皎不昧存其恍惚無視無聽致其窈冥有象此有物有物此有精有精此有信為道至於有信則與吾心符而至物得矣欲知天地萬物之所以為天地萬物者莫不始於此而已故曰吾何以知衆甫之然哉以此曲則全章第二十二曲則全枉則直窪則盈敝則新少則得多則惑是以聖人抱一為天下式不自見故明不自是故彰不自伐故有功不自欽故長夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之傳曰能知衆甫之然則能抱一致柔能抱一致柔則能曲能枉能窪能敝矣曲者曲之自然者也枉者曲之使然者也天下之物唯水為幾於道一西一東而物莫之能傷是曲則全也避礙萬折而必東是枉則直也善下而百谷歸之是窪則盈也受天下之垢而莫清焉是敝則新也唯得一者為足以與此故曰少則得衆人所以不能然者以其不一故也故曰多則惑制財用必有式傳土木必有式所持者約而所應者博也聖人抱一以為天下式亦如是而已故可以曲可以枉可以窪可以敝無往而非一也故因天下之所見而見之而我不自見也則所見無不察故曰不自見故明因天下之所是而是之而我不自是也則所是莫之能蓋故曰不自是故彰歸天下以功而我不自有也故有功任萬物以能而我不自矜也故長如是者無他得一則無我無我則不爭夫唯不爭天下莫能與之爭矣古之所謂曲則全其要如是而已知所以曲則全則知所以枉則直窪則盈敝則新矣而不自見故明不自是故彰不自伐故有功不自矜故長皆由是也豈非所謂全而歸之哉希言自然章第二十三希言自然飄風不終朝驟雨不終日孰為此者天地天地尚不能久而況於人乎故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之信不足有不信傳曰聽之不聞名曰希言而知其所以言則言出於不言而聽之不聞矣故曰希言希言者以道言也故曰自然飄風驟雨成之暴戾非出於常然也故雖天地為之尚不能自終朝終日之久人之言而不出於自然則多而數窮宜矣故唯從事於道者為能無我無我則道也德也失也吾不見其所以異故道者我則同於道德者同於德失者同於失而恢詭譎怪通為一也夫唯不見其所以異而與之同則彼雖有以異我而未嘗去我也故曰同於道者道亦得之同於德者德亦得之同於失者失亦得之唯其信不足則於是乎有道有德有失而不同矣故曰信不足有不信跂者不立章第二十四跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其於道也曰餘食贅行物或惡之故有道者不處傳曰跂之為立非立之常也跨之為行非行之常也則不可久故雖立不立雖行不行也道固無我無我則不爭則夫自見自是自矜者亦非其常也故其於道也為餘食贅行而已夫俗人皆嗜之矣而吾復取焉是餘食也性本無是而特侈之是贅行也餘食贅行物或惡之則有道宜其不處也夫道處衆人之所惡而曰物或惡之故有道者不處何也蓋卑虛柔弱者衆人之所惡而去之者也故有道者處之見是矜伐者衆人之所惡而爭之者也是以不處則或處或不處其為不爭一也有物混成章第二十五有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道強為之名曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大域中有四大而王居一焉人法地地法天天法道道法自然傳曰有氣也有形也有質也而天地人之位分可聞也可見也可摶也而耳目心之官辨是物也未見氣與形質者也氣形質渾淪而未相離者也而視之不可見聽之不可聞摶之不可得則其形不可得而見也故吾不知其名而命之其義可言也故字之曰道不知其名以心契之也字之曰道以義言之也道之為物用之則彌滿六虛而廢之莫知其所則大豈足以名之哉強為之名而已大則周行而無不在不止於吾身而已故大曰逝逝則遠而不禦故逝曰遠遠而不禦則吾求其際而不可得也復歸其根而未始離乎吾身也故遠曰反道大天大地大王亦大在六合之外則大不足以言之所謂四大者域中而已王者人之復命知常容容乃公公乃王者也故域中有四大而王處一焉王者人道之盡者也人以有形而合於無形於地亦然則地之所至人亦至焉故曰人法地天之所至地亦至焉故曰地法天道之所至天亦至焉故曰天法道道則自本自根未有天地自古以固存而以無法為法者也無法也者自然而已故曰道法自然重為輕根章第二十六重為輕根靜為躁君是以君子終日行不離輜重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失臣躁則失君傳曰輕者先感重者後應應者感之所自生則重為輕之根矣靜者役物躁者役於物躁常為靜之所役則靜為躁之君矣是以君子終日之間其行為可以約齎矣然猶不離輜重則輕之不可以無重也雖有榮觀為足以適矣而必有超然之燕處則躁之不可以無靜也終日之行與其榮觀猶且如此況乎萬乘之主任重道遠以觀天下其可不靜且重乎蓋迫而後動感而後應不得已而後起則重矣無為焉則靜矣茍其動常在於得已之際而不能無為則是以身輕天下而不重不重則躁而不靜矣故曰上無為也下亦無為也是下與上同德下與上同德則不臣下有為也上亦有為也是上與下同道上與下同道則不主蓋輕則任臣之勞而代之而臣則無為而與上同道則不臣不臣則是失臣也躁則忘君之逸而為天下用則君亦有為而與下同道則不主不主則是失君也故曰輕則失臣躁則失君善行章第二十七善行無轍迹善言無瑕謫善計不用籌算善閉無關楗而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷是謂要妙傳曰車行則有轍徒行則有迹則行固不能無轍迹者也知行之所以行則行出於不行故曰善行無轍迹知者不言言者不知則言固不能無瑕謫者也知言之所以言則言出於不言故曰善言無瑕謫一與言為二二與一為三自此以往巧曆不能算唯得一而忘言者為能致數致數則其計不可窮矣故曰善計不用籌算天門無有闢闔在我我則不闢誰能開之故曰善閉無關楗而不可開天下有常然者約束不以纏索因其常然而結之故曰善結無繩約而不可解故行而不以此則行不能無轍迹言而不以此則言不能無瑕謫計也閉也結也而不以此則雖用籌算而亂雖有關楗而開雖有繩約而解所以存於已者不能無敝其何暇人物之救哉聖人為能體道以善此五者是以常善救人而無棄人常善救物而無棄物矣何則此五者性命之理所同然者也唯聖人以知常之明而救之於所同然之際雖行之言之計之閉之結之而莫知其所以然則其明襲而不可得見故曰是謂襲明唯其善救也故善人不善人之師不善人善人之資明人之不善何棄之有哉雖然致道者忘心善人者雖不善人之師而吾不知其師之為可貴也不善人雖善人之資而吾不知其資之為可愛也不貴其師不愛其資則雖智有所不知而遠迷矣夫唯以智求之而不得此道之所以為要妙也故曰雖智大迷是謂要妙知其雄章第二十八知其雄守其雌為天下溪為天下溪常德不離復歸於嬰兒知其白守其黑為天下式為天下式常德不忒復歸於無極知其榮守其辱為天下谷為天下谷常德乃足復歸於朴朴散則為器聖人用之則為官長故大制不割傳曰雄動而雌靜雄剛而雌柔雄倡而雌和知其雄守其雌則篤靜致柔和而不倡者也故為天下溪溪之為物受於谷而輸於江海受而不拒輸而不積物之能通而無忤者也能通則常德不離矣人之生也常德內全與物無忤及為物之所遷則日益以離唯能篤靜致柔和而不倡則常德不離而復歸於嬰兒矣白於色為受采於物為明於行為金於數為四黑於色為不受染於物為晦於行為水於數為一知其白守其黑不受萬物之染若晦若水終之於抱一抱一則能曲能枉能窪能敝故可以為天下式為天下式無枉而非一則常德不忒矣不離者不離其故處而已而未必能不忒也不忒則不差矣嬰兒之為物專氣致柔不失其一體之和而已復歸於無極則嬰兒不足以言之也草木之蕃也為榮其謝也為辱人之所以為榮辱亦若是而已知其榮守其辱去華歸根雖被以天下之所甚惡而不能纍焉故為天下谷谷之為物虛而能盈應而不藏而江海之源所自出者也能為天下谷則反乎其源矣故常德乃足則又非特不忒而已復歸其朴朴者真之全而物之混成者也唯其混成而未為器故能大能小能曲能直能短能長能圓能方無施而不可則無極不足以言之也然則守其雌守其黑守其辱足矣安用知其雄與白與榮哉蓋守之以為母知之以為子守之以為經知之以為變也朴散則為器器之為物能大而不能小能曲而不能直能短而不能長能圓而不能方故聖人用之為官長而已非容乃公公乃王之道也若夫抱朴以制天下其視天下之理猶庖丁之視牛未嘗見全牛也行之於所無事而已恢恢乎其於遊刃固有餘地矣何事於割哉故曰大制不割將欲章第二十九將欲取天下而為之吾見其不得已天下神器不可為也為者敗之執者失之故物或行或隨或歔或吹或強或羸或載或隳是以聖人去甚去奢去泰傳曰聖人抱朴以治天下故大制不割則其取天下常以無事而已取之也者得天下之心使之不去者也則將欲取天下而為之者非所以取天下也非所取而取之吾是以見其不得也形而上者謂之道形而下者謂之器天下之為器神器也唯神道為可以御神器神無思也無為也而為之則御之非其道矣故不可為也為者所以求成而適足以敗之執者所以求得而適足以失之也堯非有人而非見有於人巍巍乎舜禹之有天下而不與焉凡此者真知所以取天下者也非為而執之者也是以凡物有行則有隨有詬則有吹有強則有羸有載則有隳事勢之相生不得不然也則安可以執而為之哉是以聖人去甚去奢去泰凡以輔萬物之自然而已其敢為也哉以道佐人主章第三十以道佐人主者不以兵強天下其事好還師之所處荆棘生焉大軍之後必有凶年故善者果而已不敢以取強果而勿矜果而勿伐果而勿驕果而不得已果而勿強物壯則老是謂不道不道早已傳曰人主者無為者也佐人主者有為者也取天下不能無事而為之不已其弊至於以兵強之雖佐人主者任在於有為猶為不以道也況於主道之無為乎所以然者以其事好還而已以道服天下則天下莫敢不服而以兵強天下亦將阻是而抗我矣出乎爾者反乎爾者也師之所處荆棘生焉大軍之後必有凶年師之毒天下如此故善用兵者果而已果者剋敵者也敵而剋之造攻自嗚條朕哉自亳剋敵之謂也出於不得已非所恃以取強也果而勿矜其能果而勿伐其功果而勿驕其勢其果常出於不得已是乃果而勿強之道也如果而矜其能果而伐其功果而驕其勢則是果於強非果於不得已者也凡少則壯壯則老物之情也道也者貴於守柔以為強乃所以久而不殆者也若以兵強天下則是棄柔而用壯壯而必老則物而已豈道之所以物物哉故曰物壯則老是謂不道不道早已夫佳兵章第三十一夫佳兵者不祥之器物惑惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡為上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝則以喪禮處之傳曰文覿而武匿者天地之道陰陽之理也兵而佳之是乃器之不祥而物之或惡也是以有道者不處故君子居則貴左用兵則貴右其所貴異乎平居之時則是固以不祥之器處之而非君子之器也非所以佳之也必不得已而用之恬淡為上故勝而不美也非所以佳之也天將救之以慈衛之慈者天之所以樂推而不厭也則殺人者豈非樂哉而美之則是樂殺人也樂殺人者不可得志於天下也故吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之夫以喪禮處之則是不祥之器而不美之可知已以悲哀泣之則是不樂殺人也可知已老君之察於禮學如此而謂老君絶滅禮學者豈知其所以絶滅之意乎道常無名章第三十二道常無名朴雖小天下不敢臣侯王若能守萬物將自賔天地相合以降甘露人莫之令而自均始制有名名亦既有夫亦將知止知止所以不殆譬道之在天下猶川谷之與江海傳曰道常無名名之為道則與道乖矣方其無名固未始有物也其朴可謂小矣而天下不敢臣夫何故天地資之以始萬物恃之以生則天下孰有敢臣其所自始與其所自生哉夫是乏謂真君萬物莫不有真君焉是之謂也侯王若能守則是以真君君萬物萬物孰有得其真君而不賔者乎故曰聖人作而萬物覩至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉或為之紀而莫見其形天地相合以降甘露則交通成和之至也侯王執道紀而萬物賔之也亦若是而已孰得見其形哉故人莫之令而自均也無名之朴無思也無為也工宰一動則始制有名而名亦既有矣於是之時亦將知止則其安易持其未兆易謀其脆易破其微易散為之於未有治之於未亂則何始之有哉此侯王所以守之之道也譬道之在天下猶川谷之與江海則其有不歸之者耶知人者智章第三十三知人者智自知者明勝人者有力自勝者強知足者富強行者有志不失其所者久死而不亡者壽傳曰知人者智自知者明自知然後能知人則明者固智之所自出也勝人者有力自勝者強自勝然後能勝人則強者固力之所自出也復命曰常而知常曰明不能自知非所以知常也則知常者乃所以自知也明至於自知則其於知人也何有守柔曰強與接為構曰以心鬥非所以守柔也則守柔者乃所以自勝也強至於自勝則其於聖人也何有有自知之明則知萬物莫不備於我而無待於外慕也故曰知足者富有自勝之強則於道也勤行而已矣無事於他求也故曰強行者有志知其足於已而強行之則能存其所存而不為物之所遷矣故曰不失其所者久能存其所存則雖死而未嘗亡也故曰死而不亡者壽大道泛兮章第三十四大道泛兮其可左右萬物恃之以生而不辭功成不居衣被萬物而不為主常無欲可名於小萬物歸焉而不知主可名於大是以聖人終不為大故能成其大傳曰可以左而不可以右可以右而不可以左在物一曲者非大道也大道則無乎不在故泛兮其可左右也凡物之大者則不可名於小小則不可名於大是道也以其可以左右也故萬物恃之以生而不辭功成不居衣被萬物而不為主夫唯不居不為主故常無欲常無欲則妙之至者也故可名於小萬物歸焉而不知主則容之至者也故可名於大雖然既大矣而可名於小則非大也既小矣而可名於大則非小也非大非小此道之所以隱於無名也然則道之所以為大也果不在大也聖人體道者也則其所以能成其大者豈自大也哉執大象章第三十五執大象天下往往而不害安平泰樂於餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既傳曰道之在天下猶川谷之與江海萬物歸焉而不知主是無形也無形也者大象也則孰將保我而不往哉故曰執大象天下往失道而天下往則去之而已則其往也不能無害執道而天下往則雖相忘於道術而未嘗相離也故往而不害安平泰平者安之至而泰者平之至有樂之可樂有餌之可嗜則止者過客而已矣道之出言淡乎其無味則非餌之可嗜視之不足見聽之不足聞則非樂之可樂若然者用之豈可既乎過客止則為之蘧廬而已非可久者也用之不可既則百姓日用而不知而安平泰之所自出也豈特過客止而已哉將欲歙之章第三十六將欲歙之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之是謂微明柔弱勝剛強魚不可脫於淵國之利器不可以示人傳曰將欲歙之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之天之道物之理人之事其勢未嘗不如此者也於張知歙於強知弱於興知廢於與知奪非知幾者孰能與於此哉故曰是謂微明然則能歙之張之弱之強之廢之興之奪之與之者無形而柔弱者也為其所歙所張所弱所強所廢所興所奪所與者有形而剛強者也則柔弱之勝剛強也明矣人之不可以離柔弱猶魚之不可以脫於淵魚脫於淵則獲人離於柔弱則死之徒而已矣天下之至柔馳騁天下之至堅無有入於無間馳騁天下之至堅而入於無間則器之利者也操利器以馭天下國家則其所以圖回運動者常在於無形之際安可使知其所自來哉故曰國之利器不可以示人道常無為章第三十七道常無為而無不為侯王若能守萬物將自化化而欲作吾將鎮之以無名之朴無名之朴亦將不欲不欲以靜天下將自正傳曰萬物皆有名也而道常無名則有名者莫不為之賔故言萬物將自賔則以無名言之雖然此知無為而已無為而無不為則未嘗有夫無為也故萬物將自化自化則我與萬物莫非道也孰知萬物之賔與其所以賔哉故方其自賔也始制有名名亦既有夫亦將知止知止者復於無名之朴而已方其自化也化而欲作吾將鎮之以無名之朴而無名之朴亦將不欲也無名之朴亦將不欲則豈特無為而已而亦未始有夫無為者也天下之動正夫一者也侯王守道以至於此則可謂不欲以靜矣天下其有不自正者乎夫老君真人也宜不弊弊然以天下萬物為事而於侯王之間如此其諄諄何也道以修之身為真而以修之天下為普使王侯者知而守之則修之天下不亦普乎夫不嗇其道而欲與天下同之仁也欲同之天下而先之侯王義也而學者顧見其言有絶棄仁義則曰老君槌提吾仁義而小之也吾所不取嗚呼彼不見其所以絶棄之意宜其不取焉耳道德真經傳卷之二

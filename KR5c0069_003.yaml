  text: 道德真經傳卷之三必七
  hash: sha256:1f2ee1a79d62a0d1c62de2ad841c85f3cdc63aa39b51e1af5469d83a7a408c5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0069_HFL_003-001a, image: hfl/0369/0369-106.png}
body:
  text: 資政殿學士吕惠卿傳上德不德章第三十八上德不德是以有德下德不失德是以無德上德無為而無以為下德為之而有以為上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚不處其薄居其實不居其華故去彼取此傳曰道之可道非常道則庸有得而有之者乎上德者以無得為得唯其無得乃所以得也故曰上德不德是以有德下德者以不失之為得者也唯其不失故雖得而非德故曰下德不失德是以無德上德無為非故無為也率德之自然而實無以為也下德不知出此而為之故不能不有以為也夫德無以為足矣而且有仁焉則是為之也然上仁者之於仁無所事仁而仁者也是為之而無以為也仁則不可獨者也必有義焉雖上義不得不為者也是為之而有以為也仁者施之而已義則擇所施之宜者也未責所報也禮則施報矣來而不往非禮往而不來亦非禮施報之義也上禮為之而莫之應則攘臂而仍之以其往而不來雖不以禮繼之猶不為非禮以禮之理固如是也上仁上義上禮猶如此則其下者不論而見矣由是觀之失道而後德失德而後仁失仁而後義失義而後禮豈虛言哉禮之相責望者如彼則忠信自此薄亂爭自此起而智謀之所以用也是禮雖所以治亂適所以首亂也前識雖所以用智乃所以始愚也夫何故人之治常生於厚厚則其性薄則其僞去性而作僞未有不亂者也人之自知常在於明明則其實智則其華離實而務華則未有不愚者也是以大丈夫處其厚不處其薄居其實不居其華故忘仁義絶禮學遺智慧而志於道德之大全是之謂去彼取此昔之得一章第三十九昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞其致之天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以為貞而貴高將恐蹶故貴以賤為本高以下為基是以侯王自謂孤寡不穀此其以賤為本邪非乎故致數譽無譽不欲琭琭如玉珞珞如石傳曰道一而已而得之則得之者與道為二非一也唯其得之而無得故謂之得一也昔之得一者莫不然也仰之而天也得一以清故覆焉而不傾俯之而地也得一以寧故載焉而不陷神無形而至寂者也以得一故妙乎有生而靈谷有形而至虛者也以得一故應乎所感而盈其衆為之物以得一故生而無極其尊為王侯以得一故能制天下之動而貞夫一則一之不可不致也如此故一者天之所以清地之所以寧寂之所以靈虛之所以盈萬物之所以生而侯王之所以為天下貞者也使天無以清則裂地無以寧則發神無以靈則歇谷無以盈則竭萬物無以生則滅而侯王也無以為貞而唯貴高之知其得不蹶邪故貴以賤為本則未有貴者乃貴之所自而立也高以下為基則未有高者乃高之所自而起也然則貴而無其貴高而無其高乃侯王之所以為天下貞而不蹶者邪是以孤寡不穀人之所惡而賤也而貴高以為稱者以其所本為在此也故致數而極之以至於一則貴不異乎賤而卑不離乎高而譽出於無譽矣譽無譽則毁無毁矣譽無譽則不可得而貴毁無毁則不可得而賤玉可貴故琭之石可賤故落之不欲琭琭如玉落落如石不可得而貴賤之謂也反者道之動章第四十反者道之動弱者道之用天下之物生於有有生於無傳曰道之周行萬物非不逝也而其動常在於反所謂樞始得其環中以應無窮者是也運動乎天地非不强也而其用常在於弱所謂天下之至柔馳騁天下之至堅無有入於無間者是也故天下之物生於有有生於無唯有為能生天下之物而無又能生天下之有則道之動在於反而其用在於弱可知已然則欲反而弱者無他致一以極乎無而已矣上士聞道章第四十一上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質真若渝大方無隅大器晚成大音希聲大象無形道隱無名夫唯道善貸且成傳曰孔子曰朝聞道夕死可矣則聞道者死生固不足以纍其心豈苟知之而已哉上士聞道真聞之者也真聞之則無所復疑特勤而行之而已矣夫道亦何以勤行為哉曰觀諸心以契其所聞則勤行之謂也中士聞道聞之而未審焉者也故若存若亡若存若亡則不能勤行之一出焉一入焉而已矣下士聞道聞之而不信者也故大笑之所以大笑者以情求之而不得故也使道而可以情求則彼不笑之矣故曰不笑不足以為道若古之建言者有之凡皆不可以情求之謂也冥冥之中獨見曉焉無聲之中獨聞和焉是之謂明道若昧和之以是非而休乎天均則無物不然無物不可是之謂夷道若類為道者日損損之又損之以至於無為是之謂進道若退上德者無為而無以為者也然其應如響斯不亦若谷乎大白者滌除玄覽而無疵者也然受天下之垢斯不亦若辱乎廣德者廓乎其無不容也而未嘗自見自是自矜自伐也斯不亦若不足乎善建者不拔而建之以常無有非確然有見者也故曰建德若偷體性抱神以遊世俗之間而非所驚也故曰質真若渝大方體之無南無北奭然四解淪於不測無東無西始於玄冥反於大通此大方之無隅也大成若缺然日計之而不足歲計之而有餘此大器之晚成也大音者聽之不可聞故希聲大象者視之不可見故無形凡此者皆道也然謂之明而若昧謂之夷而若類謂之進而若退以至音而希聲象而無形名與實常若相反故以道隱於無名而以名名之則常若相反者也唯道為能如此故既以為人已愈有既以與人已愈多而生之畜之長之育之成之熟之養之覆之莫非道也故曰夫唯道善貸且成道生一章第四十二道生一一生二二生三三生萬物萬物負陰而抱陽沖氣以為和人之所惡唯孤寡不穀而王公以為稱故物或損之而益益之而損人之所教亦我義教之强梁者不得其死吾將以為教父傳曰道之在天下莫與之偶者莫與之偶則一而已矣故曰道生一既謂之一則謂之者與所謂為二故曰一生二有一有二則有三矣故曰二生三故唯無名則已苟謂之一則其適遂至於三三立而萬物生矣故曰三生萬物凡幽而不測者陰也明而可見者陽也有生者莫不背於幽而不測之陰而向於明而可見之陽故曰萬物負陰而抱陽負則背之抱則向之也雖然必有沖氣以為之和蓋陰與陽二也沖氣一也萬物不得一無以生故也故人之所欲者軒冕富貴也而其所惡者孤寡不穀也軒冕在身非性命也物之儻來寄也而遂有之以為固則向陽而不知反之甚者也古之制名者以其所惡而為王公之稱者欲其貴而不忘賤高而不忘下抱而知所負向而知所反以不失乎沖一之和而已故物或損之而益益之而損滿招損謙受增時乃天道也人之所教亦我義教之我之所教道也教而不以我義者則亦非道而已蓋唯通於道者為得一得一則無我無我不爭夫唯不爭故天下莫能與之爭反是死之徒而已君子之教人雖或不同然至於反一而無我教之所自而生也故曰强梁者不得其死吾將以為教父天下之至柔章第四十三天下之至柔馳騁天下之至堅無有入於無間吾是以知無為之有益不言之教無為之益天下希及之傳曰天下之至柔馳騁天下之至堅觀於物則水是也無有入於無間觀於物則氣是也水以其柔弱故幾於道然而不能無形者也而猶攻堅强者莫之能先氣以其無質故合於神然而不能無氣者也猶能入於無間而況以無形之至柔太易之未見氣於以馳騁天下之至堅而入於無間則孰不為之動而亦何入而不自得哉故曰吾是以知無為之有益也而不言之教無為之益天下希及之是亦不知反其宗而已矣名與身章第四十四名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久傳曰列士之所徇者名也而至於殘生傷性則不知身之親於名也故曰名與身孰親貪夫之所徇者貨也而至於殘生傷性則不知身之多於貨也故曰身與貨孰多所徇者名則世謂之君子所徇者貨則世謂之小人君子小人之所徇雖或不同而亡其所存則一也然則得名與貨而亡其存則不知亡之病於得也故曰得與亡孰病是故愛名欲以貴其身也以甚愛之故並其良貴而失之是大費也蓄貨欲以富其身也以多藏之故并其至富而害之是厚亡也夫唯有德者知至貴之在已而無待於名也故知足而不辱知至富之在已而無待於貨也故知止而不殆不辱不殆則可以長久矣大成若缺章第四十五大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辨若訥躁勝寒靜勝熱清靜為天下正傳曰萬物始乎是終乎是是大成也然始無所始終無所止故若缺唯其若缺故其用日新而不敝萬物酌焉而不竭是盈也然益之而不加益故若沖唯其若沖故其用日給而不窮大直者曲之而全枉之而直者也故若屈大巧者刻雕衆形而不為巧者也故若拙大辨者不言而辨者也故若訥如是無它凡以有本故也本者何也今夫寒熱者天地之所為有形之所不免也而一躁焉則可以勝寒一靜焉則可以勝熱以一時之躁靜猶可以勝天地之所行况夫體無為之清靜以為天下正則安往而不勝者乎故以言其成則若缺而不敝以言其盈則若沖而不窮其直若屈而伸其巧若拙而工其辨若訥而諭此之謂有本天下有道章第四十六天下有道却走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣傳曰天下有道民之智能已於耕食之間而盜爭銷於無欲之際而其死已脫矣故曰却走馬以糞天下無道見可欲以為造兵之本雖有封疆之界不能定也故曰戎馬生於郊然則罪之所由生者何耶可欲而已矣故曰罪莫大於可欲由可欲故不知足則雖有餘而不止也平為福有餘為禍故曰禍莫大於不知足由不知足故欲得欲而得之則怨咎之招而兵之所以不已也故曰咎莫大於欲得故不知足者雖足而不足則知足之足常足也可知矣不出户章第四十七不出户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而知不見而名不為而成傳曰天下之所以為天下者果何邪知天下之所以為天下則不出户而知之矣天道之所以為天道者果何邪見天道之所以為天道則不窺牖而見之矣今夫天下之大固無窮也必待出而後知之則足力之所及者寡矣所知者幾何哉天道之遠固不測也必待窺而後見之則目力之所及者寡矣所見者幾何哉故曰其出彌遠其知彌少是以聖人知天下之所以為天下故不行而知見天道之所以為天道故不見而名夫何故以其備於我故也知之於所不行名之於所不見則不為而成矣為學日益章第四十八為學曰益為道日損損之又損之以至於無為無為而無不為故取天下常以無事及其有事不足以取天下傳曰為學者未聞道者也未聞道而求之則不得不摶故曰益為道者已聞道者也已聞道者而為之則期至於無為而已故曰損而損之者未免乎有為也并其損之者而損焉而後至於無為無為者無有而已無不為者乃所以無無也此之謂絶學無憂無憂之謂神神也者物物而非物者也則取於天下也何有由此觀之取天下常以無事及其有事不足以取天下觀莊周之所以應帝王者而深求之則可知已聖人無常心章第四十九聖人無常心以百姓心為心善者吾善之不善者吾亦善之德善信者吾信之不信者吾亦信之德信聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之傳曰人心其神矣乎操則存捨則亡出入無時莫知其鄉操存捨亡則無常體之可測出入無時則非今昔之可求莫知其鄉則非方所之可得神則若是人心亦然聖人先得我心之盡者也故無常心而以百姓心為心猶之鑒也無常形以所應之形為形而已聖人之視已心也如此則其視百姓心亦若是而已則善不善信不信亦何常之有哉故善者吾善之不善者吾亦善之知其心之善不善無常而以德善之故也信者吾信之不信者吾亦信之知其心之信不信亦無常而以德信之故也物得以生之謂德形體保神各有儀則之謂性性修反德德至同於初則德者性之所自出則無不善不信明矣聖人之在天下惵惵然不已為百姓渾其心渾其心也者使信善者不以自異而不善不信者不自棄故也百姓皆注其耳目唯聖人之為視聽而聖人皆孩之孩之也者遇之以慈待之以厚雖有不善不信猶善而信之知其心之無常猶已而已矣出生入死章第五十出生入死生之徒十有三死之徒十有三人之生動之死地十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地傳曰生者死之徒死者生之始則生死相為出入而已矣生之徒十有三則由生而得生非幸生者也死之徒十有三則由死而得死非不幸而死者也民之生動之死地十有三則豹養其內而虎食其外毅養其外而病攻其內非不以生為事顧不得其道而動之死地者也夫何故以其生生之厚蓋由生得生由死得死者固不必論而以生為事而反之死地其失為在此也蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地焉老子之於此言固已體之而言蓋以疑之言聞以質之何也此莊周所謂重言耶嘗試論之人之所以遇虎兕被甲兵而虎兕甲兵之所以能傷人者以吾有身故也今我視吾心莫知其鄉則吾心不可得吾心不可得則吾身與物亦不可得內不見有身外不見有物則孰為死地孰為虎兕甲兵而投其角措其爪容其刃哉然則善攝生者夫何以加此道生之章第五十一道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之成之熟之養之覆之生而不有為而不恃長而不宰是謂玄德傳曰萬物之生常本於無名之物而其畜常在於一而未形而物得以生之際無名者道也一而未形物得以生者德也及其為物則特形之而已非其所以生且畜也已有形矣則裸者不得不裸鱗介羽毛者不得不鱗介羽毛以至於幼壯老死不得不幼壯老死皆其勢之必然也故曰道生之德畜之物形之勢成之然則勢出於形形出於德德出於道道德本也形勢末也本尊而末卑本貴而末賤是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然此其所以能以無為之柔弱而勝形勢之剛强則王侯之所以賔化萬物者在此而不在彼也然則雖曰道生之德畜之物形之勢成之至本而言之則生之畜之長之育之成之熟之養之覆之莫非道也而道終無名焉故曰生而不有為而不恃長而不宰是謂玄德天下有始章第五十二天下有始以為天下母既得其母以知其子既知其子復守其母殁身不殆塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常傳曰天下有始以為天下母則經所謂吾不知其名字之曰道者是也無名天地之始有名萬物之母道常無名而為天下母何也蓋有名徒為萬物母而未足為天下母無名天地之始則自天而下皆生於無名故曰天下有始以為天下母也聞道易得道難得道易守道難今我既得其母以與心契矣非特聞之而已也則知天下之物皆我之所出也知天下之物皆我之所出而我常守之而不失則天下孰能以其所出而害其所自出哉此其所以殁身不殆也塞其兊閉其門終身不勤此則守其母之謂也心動於內而吾縱焉是之謂有兊有兊則心出而交物我則塞其兊而不通不通則心不出矣物引於外而吾納焉是之謂有門有門則物入而擾心我則閉其門而不納不納則物不入矣內不出外不入雖萬物之變藝藝於前各歸其根而不知矣夫何勤之有哉古之人有能廢心而用形者以此道也若開其兊而不塞濟其事而不損則我之心直為物之逆旅莫適守者何恃而不亡哉此所以終身不救也夫惟守其母者每見其心於動之微則寂然不動矣寂然不動感而遂通天下之故故曰見小曰明守無形之至柔而物莫之能勝也故曰守柔曰强既用其光以照其動之微復歸其明以反於寂然也則未嘗開兊濟事以至於不救何殃之有哉如是則襲於知和而深不可見矣故曰用其光復歸其明無遺身殃是謂襲常使我介然章第五十三使我介然有知行於大道唯施是畏大道甚夷民甚好徑朝甚除田甚蕪倉甚虛服文采帶利劍厭飲食資財有餘是謂盜誇非道也哉傳曰君子之於道不可以不刳心心刳而無餘雖萬變陳於前而不足以撓吾之靜夫何施而畏哉使我不能刳心而有介然之知行於大道則唯施是畏求其周行不殆不可得也況夫開其兊濟其事者耶大道之為體不知而知則夷之甚者也而民乃欲以有知求之是好徑而不知所由也人之生以食為本而食必出於田田治而倉實倉實而食足食足而財豐財豐而廷治以知其本之所自出故也今以介然有知之心而行於大道則已不得其母不得其母則其子非吾有也非吾有而取之猶之灑掃其庭內蕪其田虛其倉而服文采帶利劍厭飲食資財有餘亦非其有而取之矣非盜誇無以為也豈道也哉善建不拔章第五十四善建者不拔善抱者不脫子孫以祭祀不輟修之身其德乃真修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此傳曰凡物以建而立者未有不拔者也唯為道者建之以常無有則善建而不拔矣凡物以抱而固者未有不脫者也唯為道者抱神以靜則善抱而不脫矣夫唯所建所抱者如此則其傳豈有窮哉此子孫所以以祭祀不輟也世之所謂修德者或修之於天下國家而不知其本真乃在吾身也故曰修之身其德乃真或修諸其身而不能推之於天下國家者故曰修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普也莊周以為道之真以治身其緒餘以為國家其土苴以治天下其說出於此也然則何觀而修之身哉以身觀身而已矣何謂以身觀身今吾觀吾身之所有何自也則知吾身之所自而有矣又觀吾身之所以觀者何自也則知吾觀之所自而觀矣既知吾身之所自而有又知吾觀之所自而觀則所以修之身者已足而無待於外也以家觀家以國觀國以天下觀天下亦若是而已矣古之所以藏天下於天下者用是道也含德之厚章第五十五含德之厚比於赤子毒蟲不螫猛獸不據攫為不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至終日號而嗌不嗄和之至知和曰常知常曰明益生曰祥心使氣曰强物壯則老是謂不道不道早已傳曰人之初生其德性至厚也比其長也耳目交於外心識受於內而益生日益多則其厚者薄矣為道者損其所益生性修反德德至同於初故曰含德之厚比於赤子夫赤子之為物特以其受沖氣之和積而未散而猶毒蟲不螫猛獸不據攫鳥不搏況夫充純氣之守通乎物之所造而其和大同於物者夫孰能害之魏文侯之問卜啇是也蓋唯精為能致和何以言之今夫赤子不知所取而握固不知所與而䘒作則精也使赤子也介然有取與之知則不一而粗矣其能知是乎故曰骨弱筋柔而握固未知牝牡之合而䘒作精之至無所憂愠故雖終日號而嗌不嗄則和也使赤子也有所憂愠則氣戾而不和其能若是乎故曰終日號而嗌不嗄和之至夫形全精復與天為一精而又精反以相天精而至於相天則其充沖氣之和以至大同於物不足異也故致道之極則至於復命復命曰常含德之厚則至於知和知和亦曰常則道德雖有間及其會於常則同也知常則常因其自然而不益生動不知所為行不知所之身若槁木之枝而心若死灰奚以心使氣為哉故益生則曰祥禍福無有則無人災祥者禍福兆於此而人災隨之矣心使氣則曰强强梁者死之徒夫致虛而守柔者道也道乃久沒身不殆致實而强則物而已物壯則老其道也哉故曰物壯則老是謂不道不道早已知者不言章第五十六知者不言言者不知塞其兊閉其門挫其鋭解其紛和其光同其塵是謂玄同不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故為天下貴傳曰知至於知常則知之至也知之至則默而成之而無不理也何所容心哉茍為不能無言則不能無我雖知之非真知者也故曰知者不言言者不知塞其兊閉其門挫其鋭解其紛和其光同其塵是謂玄同則默而成之之道也若然者萬物一府死生同狀無所甚親無所甚疏故不可得而親不可得而疏不就利不違害故不可得而利不可得而害不榮通不醜窮故不可得而貴不可得而賤夫可得而親疏利害貴賤者則貴在於物而物能賤之不可得而親疏利害貴賤者貴在於我而物不能賤也其為天下貴不亦宜乎然則知道者固終不言故曰今以言言道則言非道也而知者乃以言為知則是知知矣斯言所以不得不出也以其言出於無言雖言猶不言也夫道豈默然也哉以正洽國章第五十七以正治國以奇用兵以無事取天下吾何以知其然哉以此天下多忌諱而民彌貧人多利器國家滋昏人多技巧奇物滋起法令滋彰盜賊多有故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴傳曰國容不入軍軍容不入國其來久矣則其所以治國用兵者固不同也治國者不可以不常且久者也故以正而不以奇正者所以常且久也兵者不祥之器非君子之器故有道者不處兵而常且久則是處之也故以奇而不以正奇者應一時之變者也以其故不能不有以為以正故不以智治國國之福也治國而無所事智則有事之不可以取天下也明矣故曰以正治國以奇用兵以無事取天下何以知無事之足以取天下哉以有事不足以取天下而知之也夫唯為不出於無為而至於有事則天下多忌諱以避其所惡則失業者衆而民彌貧人多利器以趨其所好則下難知而國家滋昏民彌貧而多利巧國家滋昏而奇物滋起此法令所以滋彰而盜賊多有也法禁於法之所加而不能禁於法之所不加令行於令之所聽而不能行於令之所不聽民貧而多利巧則令有所不聽矣國家昏而奇物滋起則法有所不加矣此所以滋彰而盜賊多有也若然者凡以有事取天下之過也故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴此則取天下常以無事之證也蓋我無為而民自化我好靜而民自正則民多利巧奇物滋起法令滋彰盜賊多有未之有也我無事而民自富我無欲而民自朴則天下多忌諱而民彌貧人多利器國家滋昏亦未之有也蓋其失之也由有事故天下多忌諱而民彌貧人多利器而國家滋昏唯其如此故民多利巧奇物滋起法令滋彰盜賊多有也其復之也由無為故好靜無為故民自化而絶巧棄利奇物不起好靜故民自正而盜賊無有由無為好靜故無事而無欲以無事故民自富而無忌諱之貧以無欲故民自朴而無利器之昏其序然也其政悶悶章第五十八其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復為奇善復為妖民之迷其曰固久是以聖人方而不割廉而不劌直而不肆光而不耀傳曰以正治國以無事取天下則其政悶悶悶悶者言其不以察為快也故其民淳淳淳淳者言其不澆於薄也以智治國以有事為天下則其政察察察察者反悶悶者也故其民缺缺缺缺者言其不全於朴也淳淳故安於德性而不為禍福奇正善妖之所遷是不澆於薄也缺缺故避禍而未必免求福而未必得以為正也而有時乎為奇以為善也而有時乎為妖而禍福奇正善妖未知孰在也徒令智多而難治是不全於朴也何則時有終始世有變化禍福淳淳至有所拂者有所宜有所拂者世所謂禍而有所宜則福所倚也有所宜者世所謂福而有所拂則禍所伏也則孰知其極而避就之耶自殉殊面有所正者有所差則所謂正者果未可知也今為正者後或為奇此為奇者彼或為正善與妖亦然則天下之禍福正奇善妖果未可定也民自有知以來迷而執之其日久矣奈何重之以察察之政而使之不得反朴而全乎是以聖人方而不割故不以一人斷制利天下廉而不劌故勝物而不傷直而不肆故能曲全而枉直光而不耀故用其光復歸其明此無它取此悶悶而去彼察察故也治人事天章第五十九治人事天莫如嗇夫唯嗇是謂早復早復謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久是謂深根固蒂長生久視之道傳曰治人而不以人之所以為人者而治之則人不可得而治矣事天而不以天之所以為天者而事之則天不可得而事矣精神四達並流而無所不極化育萬物其名為同帝則人之所以為人而天之所以為天者也純素之道唯神是守守而勿失與神為一則人其有不可得而治天其有不可得而事者乎故曰治人事天莫如嗇也夫唯嗇其精神而不用則早復者也苟為不嗇而費之至於神弊精勞雖欲反其精神亦無由入矣其於復也不亦晚乎故曰夫唯嗇是謂早復人之生也固足於德夫誠能嗇而早復之則德日益以充故曰早復謂之重積德重積德則德之至者也至德者火不能熱水不能溺寒暑不能害而禽獸不能賊則安往而不克哉故曰重積德則無不克夫有所不克則其道有時而極也無所不克則孰知其極哉故曰無不克則莫知其極夫有土者有大物也有大物者不可以物物而不物故能物物莫知其極則不物而能物物者也雖有土而無其纍矣故曰莫知其極可以有國既得其母以知其子既知其子復守其母殁身不殆故曰有國之母可以長久然則嗇之為道是謂深根固蒂長生久視之道也精神者生之根嗇而藏之則根深而生長矣長生者視之蒂衛而保之則蒂固而視久矣道德真經傳卷之三
